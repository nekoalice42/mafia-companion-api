services:
  database:
    ports:
      - "127.0.0.1:5432:5432"
  migrations:
    image: "ghcr.io/nekoalice42/mafia-companion-api/migrations:dev"
    build:
      context: .
      target: migrations
  cleaner:
    image: "ghcr.io/nekoalice42/mafia-companion-api/cleaner:dev"
    build:
      context: .
      target: cleaner
  server:
    image: "ghcr.io/nekoalice42/mafia-companion-api/server:dev"
    build:
      context: .
      target: server
    ports:
      - "127.0.0.1:8080:8080"
